<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartHome Steuerung</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0a0c0f;
      color: #b8cce0;
      text-align: center;
      padding: 20px;
    }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #3d8eff;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
    #data {
      margin-top: 20px;
      background: rgba(255,255,255,0.05);
      padding: 10px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <h1>SmartHome Steuerung</h1>
  <button id="loginBtn" style="display:none;">🔑 Mit Google anmelden</button>
  <div id="data"></div>

  <!-- Google API Client -->
  <script src="https://apis.google.com/js/api.js" async defer></script>
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <script>
    /* ==== KONFIGURATION ==== */
    const CLIENT_ID = "801207360349-a15mjbkcqhvlgjvqaev642lb0t4v81fd.apps.googleusercontent.com";
    const SHEET_ID = "1-7n3D5y2Aecv9ULOB9LpVC9tcXU5-H87IgyYCR2sOqM";
    const SCOPES = "https://www.googleapis.com/auth/spreadsheets";

    /* ==== VARIABLEN ==== */
    let tokenClient;
    let gapiInited = false;
    let gisInited = false;

    /* ==== LOGIN BUTTON ==== */
    document.getElementById("loginBtn").onclick = () => {
      tokenClient.requestAccessToken({ prompt: 'consent' });
    };

    /* ==== GAPI LADEN ==== */
    function gapiLoaded() {
      gapi.load('client', initializeGapiClient);
    }

    async function initializeGapiClient() {
      await gapi.client.init({
        discoveryDocs: ["https://sheets.googleapis.com/$discovery/rest?version=v4"],
      });
      gapiInited = true;
      maybeEnableLogin();
    }

    /* ==== GOOGLE IDENTITY LADEN ==== */
    function gisLoaded() {
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: async (tokenResponse) => {
          document.getElementById("loginBtn").style.display = "none";
          await gapi.client.load("sheets", "v4");
          loadSheetData();
        },
      });
      gisInited = true;
      maybeEnableLogin();
    }

    /* ==== BUTTON ANZEIGEN WENN BEREIT ==== */
    function maybeEnableLogin() {
      if (gapiInited && gisInited) {
        document.getElementById("loginBtn").style.display = "inline-block";
      }
    }

    /* ==== DATEN LADEN ==== */
    async function loadSheetData() {
      try {
        const sheetName = "Dashboard";
        const response = await gapi.client.sheets.spreadsheets.values.get({
          spreadsheetId: SHEET_ID,
          range: sheetName,
        });

        const rows = response.result.values;
        if (!rows || rows.length === 0) {
          document.getElementById("data").innerHTML = "Keine Daten gefunden.";
          return;
        }

        let html = "<table border='1' cellpadding='5'><tr><th>Spalte 1</th><th>Spalte 2</th><th>Spalte 3</th></tr>";
        rows.forEach(r => {
          html += `<tr><td>${r[0] || ""}</td><td>${r[1] || ""}</td><td>${r[2] || ""}</td></tr>`;
        });
        html += "</table>";
        document.getElementById("data").innerHTML = html;

      } catch (err) {
        console.error("❌ API-Fehler:", err);
        document.getElementById("data").innerHTML =
          "Fehler beim Laden: " + JSON.stringify(err.result || err, null, 2);
      }
    }

    /* ==== CALLBACKS ==== */
    window.gapiLoaded = gapiLoaded;
    window.gisLoaded = gisLoaded;
  </script>

  <!-- Initialisierung -->
  <script>
    // Warten bis beide Skripte geladen sind
    window.addEventListener('load', () => {
      if (typeof gapiLoaded === "function") gapiLoaded();
      if (typeof gisLoaded === "function") gisLoaded();
    });
  </script>

</body>
</html>
