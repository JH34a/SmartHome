<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartHome App</title>

<!-- Manifest für PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#007BFF">

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
        background: #f4f4f4;
    }
    header {
        background: #007BFF;
        color: white;
        padding: 10px;
        text-align: center;
    }
    button {
        padding: 10px 15px;
        font-size: 16px;
        background: #28a745;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }
    button:hover {
        background: #218838;
    }
    table {
        border-collapse: collapse;
        margin-top: 20px;
        width: 100%;
        background: white;
    }
    td, th {
        border: 1px solid #ccc;
        padding: 8px;
        text-align: center;
    }
</style>

<!-- Google API Scripts -->
<script src="https://apis.google.com/js/api.js" async defer></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<header>
    <h1>SmartHome Steuerung</h1>
</header>

<main>
    <button id="loginBtn">🔑 Mit Google anmelden</button>
    <div id="data"></div>
</main>

<script>
/* ==== KONFIGURATION ==== */
const CLIENT_ID = "801207360349-a15mjbkcqhvlgjvqaev642lb0t4v81fd.apps.googleusercontent.com"; // von Google Cloud
const SHEET_ID = "AKfycby8phTBLxb62lDFvPG8d7qSNYBk8DF1nLocvnFFFPzb3cr8BzVvWfODGEavw-zqh37KXw"; // aus der Google Sheets URL
const SCOPES = "https://www.googleapis.com/auth/spreadsheets";

/* ==== VARIABLEN ==== */
let tokenClient;
let gapiInited = false;
let gisInited = false;

/* ==== LOGIN BUTTON ==== */
document.getElementById("loginBtn").onclick = () => {
    tokenClient.requestAccessToken({ prompt: 'consent' });
};

/* ==== GAPI LADEN ==== */
function gapiLoaded() {
    gapi.load('client', initializeGapiClient);
}

async function initializeGapiClient() {
    await gapi.client.init({
        discoveryDocs: ["https://sheets.googleapis.com/$discovery/rest?version=v4"],
    });
    gapiInited = true;
}

/* ==== GOOGLE IDENTITY LADEN ==== */
function gisLoaded() {
    tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: async (tokenResponse) => {
            document.getElementById("loginBtn").style.display = "none";
			await gapi.client.load("sheets", "v4");
            loadSheetData();
        },
    });
    gisInited = true;
}

/* ==== DATEN LADEN ==== */
async function loadSheetData() {
    try {
        let response = await gapi.client.sheets.spreadsheets.values.get({
            spreadsheetId: SHEET_ID,
            range: "Dashboard!A2:W6", // Bereich anpassen
        });
        let rows = response.result.values;
        if (!rows || rows.length === 0) {
            document.getElementById("data").innerHTML = "<p>Keine Daten gefunden.</p>";
            return;
        }
        let html = "<table><tr><th>Spalte 1</th><th>Spalte 2</th><th>Spalte 3</th></tr>";
        rows.forEach(r => {
            html += "<tr><td>" + (r[0] || "") + "</td><td>" + (r[1] || "") + "</td><td>" + (r[2] || "") + "</td></tr>";
        });
        html += "</table>";
        document.getElementById("data").innerHTML = html;
    } catch (err) {
    console.error(err);
    document.getElementById("data").innerHTML = 
        "<p style='color:red;'>Fehler beim Laden:<br>" + JSON.stringify(err.result || err, null, 2) + "</p>";
    }
}

/* ==== CALLBACKS ==== */
window.gapiLoaded = gapiLoaded;
window.gisLoaded = gisLoaded;
</script>

<!-- Lade Google API & Identity Services -->
<script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
<script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>

</body>
</html>
