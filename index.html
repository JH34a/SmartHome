<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Testseite</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        header {
            background: #007BFF;
            color: white;
            padding: 10px;
            text-align: center;
        }
        main {
            background: white;
            padding: 20px;
            border-radius: 5px;
        }
        footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9em;
            color: #555;
        }
        button {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 3px;
        }
        button:hover {
            background: #218838;
        }
    </style>
</head>
<body>

    <header>
        <h1>Willkommen auf meiner Testseite</h1>
    </header>

    <main>
        <h2>Überschrift</h2>
        <p>Dies ist ein Absatz mit <strong>fettgedrucktem</strong> und <em>kursivem</em> Text.</p>

        <h3>Liste</h3>
        <ul>
            <li>Erster Punkt</li>
            <li>Zweiter Punkt</li>
            <li>Dritter Punkt</li>
        </ul>

        <h3>Bild</h3>
        <img src="https://via.placeholder.com/150" alt="Platzhalterbild">

        <h3>Button mit JavaScript</h3>
        <button onclick="alert('Hallo! Dies ist ein Test.')">Klick mich</button>
    </main>

    <footer>
        &copy; 2026 Meine Testseite
    </footer>

</body>
</html>
